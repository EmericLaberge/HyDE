# Vim-style keybinds for HyDE userprefs
# This file survives HyDE updates - add your personal binds here

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░

# // ░█▀▀░█░░░▀█▀░█▀▀░█░█░█▀▀░█▀█░█▀▄░█▀▀░█▀▀
# // ░█▀▀░█░░░░█░░█░░░█▀▄░█▀▀░█▀█░█▀▄░█░░░█▀▀
# // ░▀▀▀░▀▀▀░▀▀▀░▀░░░▀░▀░▀▀▀░▀░▀░▀░▀░▀▀▀░▀▀▀

# // █▀▄▀█ █▀▀ █▀▀ █▀▀ █▀▀ █▄░█ █▀█ █▀█ █▀▀ █▀
# // █░▀░█ ██▄ █▄▄ ████ ██▄ █░▀█ █▀▀ █▀▄ ██▄ ▄█

# Super+HJKL = focus window (vim-style)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Super+Shift+HJKL = move window (vim-style)
bind = $mainMod Shift, h, movewindow, l
bind = $mainMod Shift, j, movewindow, d
bind = $mainMod Shift, k, movewindow, u
bind = $mainMod Shift, l, movewindow, r

# Ctrl+Super+HJKL = swap window (vim-style)
bind = Ctrl $mainMod, h, swapwindow, l
bind = Ctrl $mainMod, j, swapwindow, d
bind = Ctrl $mainMod, k, swapwindow, u
bind = Ctrl $mainMod, l, swapwindow, r

# Ctrl+Super+Shift+HJKL = resize window (vim-style)
binde = Ctrl $mainMod Shift, h, resizeactive, -20 0
binde = Ctrl $mainMod Shift, j, resizeactive, 0 20
binde = Ctrl $mainMod Shift, k, resizeactive, 0 -20
binde = Ctrl $mainMod Shift, l, resizeactive, 20 0

# // █▀█ █▀█ █▀█ █░█ █░█░█
# // █▀▄ █▄█ █▀▄ █▄█ ▀▄▀▄▀

# Hyper key bindings (CapsLock remapped via keyd to Ctrl+Shift+Alt+Super)
bind = Ctrl Shift Alt Super, h, movefocus, l
bind = Ctrl Shift Alt Super, j, movefocus, d
bind = Ctrl Shift Alt Super, k, movefocus, u
bind = Ctrl Shift Alt Super, l, movefocus, r
bind = Ctrl Shift Alt Super, m, fullscreen, 1
bind = Ctrl Shift Alt Super, s, exec, ~/.config/hypr/scripts/move_maximized_window.sh l
bind = Ctrl Shift Alt Super, g, exec, ~/.config/hypr/scripts/move_maximized_window.sh r
bind = Ctrl Shift Alt Super, u, focusmonitor, l
bind = Ctrl Shift Alt Super, i, focusmonitor, r

# // █▀▄ █▀▀ █▄░█ █░█ █▀█ █▄░█
# // █▄▀ ██▄ █░▀█ █▄█ █▄█ █░▀█

# Monitor focus (vim-style)
bind = $mainMod, z, focusmonitor, HDMI-A-1

# // █▀█ █▀█ █▀█ █▀▀ █▀
# // █▄█ █▀▄ █▀▄ ██▄ ▄█

# Keyboard layout switch
bind = $mainMod, space, exec, bash /home/emeric/.config/hypr/hyprland/scripts/switch-kb-layout.sh

# // ░█▀▀░█░░░▀█▀░█▀▀░█▀█░█▀▄░█▀▀░█▀
# // ░█▀▀░█░░░░█░░█░░░█▀█░█▀▄░█░░░█▀▀
# // ░▀▀▀░▀▀▀░▀▀▀░▀░░░▀░▀░▀░▀░▀▀▀░▀▀▀

# Rofi launcher (hyper+return)
bind = Ctrl Shift Alt Super, Return, exec, bash ~/.config/rofi/launchers/type-6/launcher.sh

# // █▀▄▀█ █▀▀ █▀▀ █▀▀ █▀▀ █▄░█ █▀█ █▀█ █▀▀ █▀
# // █░▀░█ ██▄ █▄▄ ████ ██▄ █░▀█ █▀▀ █▀▄ ██▄ ▄█

# Disable HyDE window switcher that conflicts with our rofi
unbind = Super, TAB

# Session locks (super+shift for suspend)
bind = $mainMod, l, exec, hyde-shell lock-session
bind = $mainMod Shift, l, exec, hyde-shell suspend-session
